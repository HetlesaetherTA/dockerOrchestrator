root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # 🟢 Pointing to your exact main directory
  cmd = "go build -o ./tmp/main ./cmd/dockerOrchestrator/dockerOrchestrator.go"

  bin = "./tmp/main"
  pre_cmd  = ["export $(cat .env | xargs)"]
  # Watch these extensions
  include_ext = ["go", "tpl", "tmpl", "html", "toml"]
  # Ignore these directories
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  # Watch these directories
  include_dir = []
  # Delay line compilation if files change too fast
  delay = 200 # ms
  # Stop rebuilding if an error occurs
  stop_on_error = true

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
